                        "surface-bright": "#faf9fd",

                        "on-primary-container": "#7a93c3",
                        "on-primary": "#ffffff",
                        "surface": "#faf9fd",
                        "surface-container-highest": "#e3e2e6",
                        "background": "#faf9fd",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f4f3f7",
                        "inverse-on-surface": "#f1f0f4",
                        "primary-fixed": "#d7e3ff",

                        "sm": "8px",
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",

                    "fontFamily": {
                        "body-md": ["Lexend"],
                        "label-caps": ["Lexend"],

                        "h2": ["Lexend"]

                    "fontSize": {

                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.08em", "fontWeight": "600"}],

            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#0D2B55] dark:bg-slate-950 shadow-md">
<div class="flex items-center gap-4">
<button class="text-white hover:bg-white/10 p-2 rounded-full transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-lexend font-semibold text-lg tracking-tight text-white uppercase tracking-wide">ASATA Connect</h1>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full border-2 border-white/20 overflow-hidden active:scale-95 transition-transform">
<img class="w-full h-full object-cover" data-alt="professional portrait of a confident male athlete with a clean-cut look and modern hairstyle in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDc0HH4KxZyGz8NNA9F2n4EC5Ch7uUENQv4vg81rTegwDyF82hyp90yl3dt2JZSD_iY8uI3uNaihIeRfgofhhv4oN9lLsD2nn9mtIuwV8JFFCN9ccw2J8FT8IXQSj9oE7lRrPWyLA_C_rIqZEZUrdv87EU_bbU8lBPBcbgBHz2-9LJePpZbl_ZvMJrI6gIXFenYn9Y2yBsImpuBPgVhtmwRaxKqXViBP8LO_BUDSndwh9n5JHPkFs0rhLNr4_6mBOxvtPAsy9qeCkE"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 mb-32 px-container-margin py-xl bg-mesh">
<div class="max-w-md mx-auto space-y-xl">
<!-- Page Title -->
<div class="space-y-xs">
<p class="text-label-caps font-label-caps text-on-primary-container">Account Settings</p>
<h2 class="text-h2 font-h2 text-primary">Modifier le profil</h2>
</div>
<!-- Photo Picker Section -->
<div class="flex flex-col items-center justify-center py-md">
<div class="relative group">
<div class="w-32 h-32 rounded-full border-4 border-white shadow-lg overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="close-up profile photo of a professional athlete used as an avatar for an account edit screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrd2AfzuzH_kuHqwF9Std12b_ZP3KTJUA-IuKK6NueDWZwISiCuQtz2osGNdSJbQSrjV-ulZV-z1AG921rLWwh8CnQwVwGpdWKhi89KfjkRLHjCKiYa2lMn7EKlMUlOhIsaDlBbs9VFdyJCD99UUCMOuJdZ_OWB1uKuRKUB-EEei0M5M_7Ced-wT4JUSbFlxp2u0QZhrAOYf8rqsinVPtLnFAjXrYZOuY6QiCpKLbtWq1CGuh5tPE_khxT0jankoq6cKWY__uelSw"/>
</div>
<button class="absolute bottom-1 right-1 bg-[#42A5F5] text-white p-2 rounded-full shadow-md hover:bg-[#1e88e5] transition-all active:scale-90 border-2 border-white">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<p class="mt-md text-body-sm font-body-sm text-secondary">Changer la photo de profil</p>
</div>
<!-- Form Section -->
<form class="space-y-gutter">
<div class="space-y-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-1">PRÉNOM</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-on-primary-container focus:border-on-primary-container outline-none transition-all shadow-sm font-body-md text-on-surface" type="text" value="Jean"/>
</div>
<div class="space-y-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-1">NOM</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-on-primary-container focus:border-on-primary-container outline-none transition-all shadow-sm font-body-md text-on-surface" type="text" value="Dupont"/>
</div>
<div class="space-y-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-1">EMAIL</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-on-primary-container focus:border-on-primary-container outline-none transition-all shadow-sm font-body-md text-on-surface" type="email" value="jean.dupont@asata.com"/>
</div>
<div class="space-y-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-1">NUMÉRO DE TÉLÉPHONE</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-on-primary-container focus:border-on-primary-container outline-none transition-all shadow-sm font-body-md text-on-surface" type="tel" value="+33 6 12 34 56 78"/>
</div>
<div class="space-y-xs">
<label class="text-label-caps font-label-caps text-on-surface-variant ml-1">BIO</label>
<textarea class="w-full p-md bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-on-primary-container focus:border-on-primary-container outline-none transition-all shadow-sm font-body-md text-on-surface" rows="3">Passionné par le sport de haut niveau et le management associatif.</textarea>
</div>
</form>
</div>
</main>
<!-- Sticky Bottom Action Button -->
<div class="fixed bottom-[84px] left-0 w-full px-container-margin py-md z-40">
<button class="w-full h-14 bg-[#0D2B55] text-white font-button text-button rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Enregistrer</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-white dark:bg-slate-900 px-2 py-3 pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.05)] border-t border-slate-100 dark:border-slate-800 rounded-t-xl">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-lexend text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="event">event</span>
<span class="font-lexend text-[10px] font-medium">Events</span>
</a>
<a class="flex flex-col items-center justify-center text-[#42A5F5] dark:text-sky-400 font-bold active:scale-98 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="workspace_premium" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-lexend text-[10px]">Joined</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="campaign">campaign</span>
<span class="font-lexend text-[10px] font-medium">News</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-lexend text-[10px] font-medium">Alerts</span>
</a>
</nav>
</body></html>
